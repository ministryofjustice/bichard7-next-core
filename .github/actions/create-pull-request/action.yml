name: "Create pull request"
description: "Commits changes and creates a pull request"

inputs:
  github_token:
    description: "GitHub token for creating the PR"
    required: true
  branch:
    description: "Name of the branch to push changes to"
    required: true
  commit_message:
    description: "Commit message of the changes"
    required: true
  pr_title:
    description: "Title of the created PR"
    required: true
  update_type:
    description: "The type of update for the body text (e.g., 'npm dependency updates', 'standing data updates')"
    required: true
  user_name:
    description: "Name of the user authoring the PR"
    required: false
    default: "Github"
  user_email:
    description: "Email of the user authoring the PR"
    required: false
    default: "noreply@github.com"

outputs:
  pull-request-number:
    description: "The number of the created PR"
    value: ${{ steps.cpr.outputs.pull-request-number }}
  pull-request-url:
    description: "The URL of the created PR"
    value: ${{ steps.cpr.outputs.pull-request-url }}

runs:
  using: "composite"
  steps:
    - name: Create pull request
      id: cpr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        BRANCH: ${{ inputs.branch }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        PR_TITLE: ${{ inputs.pr_title }}
        UPDATE_TYPE: ${{ inputs.update_type }}
        USER_NAME: ${{ inputs.user_name }}
        USER_EMAIL: ${{ inputs.user_email }}
        WORKFLOW_NAME: ${{ github.workflow }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        git config user.name "$USER_NAME"
        git config user.email "$USER_EMAIL"

        git checkout -B "$BRANCH"
        git add .

        # Deletes branch if there are no staged changes
        if git diff --cached --quiet; then
          git push origin --delete "$BRANCH" || true
          echo "pull-request-number=" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        git commit -m "$COMMIT_MESSAGE"
        git push -f origin "$BRANCH"

        # Get existing PR if it exists
        PR_DATA=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')

        PR_BODY="Automated $UPDATE_TYPE generated by the [$WORKFLOW_NAME]($RUN_URL) workflow."

        if [ "$PR_DATA" = "0" ]; then
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$PR_TITLE" \
            --body "$PR_BODY"
        fi

        PR_NUMBER=$(gh pr view "$BRANCH" --json number --jq '.number')
        PR_URL=$(gh pr view "$BRANCH" --json url --jq '.url')

        echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"
