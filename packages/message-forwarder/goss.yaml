user:
  node:
    exists: true
    uid: 1000
    gid: 1000
    groups:
      - node
    home: /home/node
    shell: /bin/bash
command:
  node --version:
    exit-status: 0
    stdout:
      - v24.14.0
    stderr: []
    timeout: 10000
file:
  /proc/1/cmdline:
    exists: true
    contents:
      - node
