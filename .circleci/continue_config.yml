version: 2.1

orbs:
  node: circleci/node@7.2.1

parameters:
  docker-layer-caching:
    type: boolean
    default: false
  circleci-changes:
    type: boolean
    default: false
  env-changes:
    type: boolean
    default: false
  api-changes:
    type: boolean
    default: false
  common-changes:
    type: boolean
    default: false
  conductor-changes:
    type: boolean
    default: false
  core-changes:
    type: boolean
    default: false
  message-forwarder-changes:
    type: boolean
    default: false
  ui-changes:
    type: boolean
    default: false
  user-service-changes:
    type: boolean
    default: false
  e2e-test-changes:
    type: boolean
    default: false
  characterisation-test-changes:
    type: boolean
    default: false

commands:
  fetch_images:
    parameters:
      images:
        default: ""
        type: string
    steps:
      - run:
          name: "Fetch images: <<parameters.images>>"
          command: bash .circleci/scripts/fetch-docker-images.sh <<parameters.images>>

  node_install_packages:
    steps:
      - restore_cache:
          name: Restore npm Cache
          keys:
            - v1-npm-deps-{{ checksum "package-lock.json" }}
            - v1-npm-deps-
      - run:
          name: Install Node Packages
          command: npm ci --ignore-scripts --no-audit
      - save_cache:
          name: Save npm Cache
          key: v1-npm-deps-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

  build_common:
    steps:
      - run:
          name: Build Common
          command: npm run build -w packages/common

  build_core:
    steps:
      - build_common
      - run:
          name: Build Core
          command: npm run build -w packages/core

  save_artifacts:
    steps:
      - run:
          name: Compress the artifacts for easier downloading
          when: always
          command: bash .circleci/scripts/screenshots-compress.sh
      - run:
          name: Move the gzipped files across
          when: always
          command: bash .circleci/scripts/screenshots-move.sh
      - store_artifacts:
          path: /home/circleci/project/saved_artifacts
      - store_test_results:
          path: packages/e2e-test/test-results/results/report.xml

  load_ui_image:
    steps:
      - run:
          name: Load ui image
          command: docker image load < "images/ui.tar.gz"

  load_user_service_image:
    steps:
      - run:
          name: Load user-service image
          command: docker image load < "images/user-service.tar.gz"

  load_api_image:
    steps:
      - run:
          name: Load api image
          command: docker image load < "images/api.tar.gz"

  load_postgres_image:
    steps:
      - run:
          name: Load postgres image
          command: docker image load < "images/postgres.tar.gz"

  load_leds_image:
    steps:
      - run:
          name: Load leds image
          command: docker image load < "images/leds.tar.gz"

  load_message_forwarder_image:
    steps:
      - run:
          name: Load message-forwarder image
          command: docker image load < "images/message-forwarder.tar.gz"

  load_worker_image:
    steps:
      - run:
          name: Load worker image
          command: docker image load < "images/worker.tar.gz"

  load_audit_logging_image:
    steps:
      - run:
          name: Load audit log api image
          command: docker image load < "images/audit-log-api.tar.gz"
      - run:
          name: Load event handler image
          command: docker image load < "images/event-handler.tar.gz"

  start_services:
    parameters:
      ARGS:
        default: ""
        type: string
      SERVICES:
        default: ""
        type: string
      FLAGS:
        default: ""
        type: string
    steps:
      - run:
          name: "Run services: <<parameters.SERVICES>>"
          command: |
            <<parameters.ARGS>> docker compose --project-name bichard -f environment/docker-compose.yml \
            up -d <<parameters.SERVICES>> <<parameters.FLAGS>> --wait <<parameters.SERVICES>>

  set_docker_tag:
    steps:
      - run:
          name: Export dynamic DOCKER_TAG
          command: |
            SANITIZED_BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's/[^a-zA-Z0-9_.-]/-/g')
            echo "export DOCKER_TAG=${SANITIZED_BRANCH:-latest}" >> $BASH_ENV

  build_and_cache_image:
    parameters:
      image_name:
        type: string
      dockerfile:
        type: string
      cache_key:
        type: string
      image_tag:
        type: string
        default: ""
      context:
        type: string
        default: "."
      lockfile:
        type: string
        default: "package-lock.json"
    steps:
      - restore_cache:
          name: Restore BuildKit cache for << parameters.image_name >>
          keys:
            - << parameters.cache_key >>-{{ checksum "<< parameters.dockerfile >>" }}-{{ checksum "<< parameters.lockfile >>" }}
            - << parameters.cache_key >>-{{ checksum "<< parameters.dockerfile >>" }}-
            - << parameters.cache_key >>-
      - run:
          name: Build << parameters.image_name >> Docker image
          command: |
            IMAGE_TAG="<< parameters.image_tag >>"
            if [ -z "$IMAGE_TAG" ]; then
              IMAGE_TAG="${DOCKER_TAG}"
            fi
            docker buildx build \
              --cache-from type=local,src=/tmp/buildx-cache-<< parameters.image_name >> \
              --cache-to type=local,dest=/tmp/buildx-cache-<< parameters.image_name >>-new,mode=max \
              -f << parameters.dockerfile >> \
              -t "<< parameters.image_name >>:${IMAGE_TAG}" \
              --load \
              << parameters.context >>
      - run:
          name: Rotate cache for << parameters.image_name >>
          when: always
          command: |
            rm -rf /tmp/buildx-cache-<< parameters.image_name >>
            mv /tmp/buildx-cache-<< parameters.image_name >>-new /tmp/buildx-cache-<< parameters.image_name >>
      - save_cache:
          name: Save BuildKit cache for << parameters.image_name >>
          key: << parameters.cache_key >>-{{ checksum "<< parameters.dockerfile >>" }}-{{ checksum "<< parameters.lockfile >>" }}
          paths:
            - /tmp/buildx-cache-<< parameters.image_name >>

ui_params: &ui_params
  api:
    type: boolean
    default: false
  forces-with-api-enabled:
    type: string
    default: ""
  forces-with-court-date-received-date-mismatch-enabled:
    type: string
    default: "01"
  api-case-details:
    type: boolean
    default: false
  api-case-list:
    type: boolean
    default: false
  api-case-resubmit:
    type: boolean
    default: false

ui_envs: &ui_envs
  USE_API: << parameters.api >>
  FORCES_WITH_API_ENABLED: << parameters.forces-with-api-enabled >>
  FORCES_WITH_COURT_DATE_RECEIVED_DATE_MISMATCH_ENABLED: << parameters.forces-with-court-date-received-date-mismatch-enabled >>
  USE_API_CASE_ENDPOINT: << parameters.api-case-details >>
  USE_API_CASES_INDEX_ENDPOINT: << parameters.api-case-list >>
  USE_API_CASE_RESUBMIT_ENDPOINT: << parameters.api-case-resubmit >>

any_change: &any_change
  or:
    - << pipeline.parameters.circleci-changes >>
    - << pipeline.parameters.ui-changes >>
    - << pipeline.parameters.user-service-changes >>
    - << pipeline.parameters.e2e-test-changes >>
    - << pipeline.parameters.common-changes >>
    - << pipeline.parameters.core-changes >>
    - << pipeline.parameters.api-changes >>
    - << pipeline.parameters.env-changes >>
    - << pipeline.parameters.conductor-changes >>
    - << pipeline.parameters.message-forwarder-changes >>

jobs:
  lint_and_build:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout
      - node/install
      - node_install_packages
      - run:
          name: Check the code for linting errors
          command: nvm use && npm run lint:ci
      - run:
          name: Build Core Packages
          command: npm run build:core

  build_audit_logging_images:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            <<: *any_change
          steps:
            - run: circleci-agent step halt
      - checkout
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - fetch_images:
          images: nodejs-20-2023 nginx-nodejs-20-2023-supervisord
      - run:
          name: Clone bichard7-next-audit-logging
          command: git clone --depth 1 https://github.com/ministryofjustice/bichard7-next-audit-logging.git /home/circleci/bichard7-next-audit-logging
      - build_and_cache_image:
          image_name: "audit-log-api"
          dockerfile: "/home/circleci/bichard7-next-audit-logging/src/audit-log-api/Dockerfile"
          context: "/home/circleci/bichard7-next-audit-logging"
          cache_key: "audit-log-api-cache-v1"
          image_tag: "latest"
          lockfile: "/home/circleci/bichard7-next-audit-logging/package-lock.json"
      - build_and_cache_image:
          image_name: "event-handler"
          dockerfile: "/home/circleci/bichard7-next-audit-logging/src/event-handler/Dockerfile"
          context: "/home/circleci/bichard7-next-audit-logging"
          cache_key: "event-handler-cache-v1"
          image_tag: "latest"
          lockfile: "/home/circleci/bichard7-next-audit-logging/package-lock.json"
      - run:
          name: Save Docker images
          command: |
            mkdir -p images
            docker image save "audit-log-api:latest" | pigz > "images/audit-log-api.tar.gz"
            docker image save "event-handler:latest" | pigz > "images/event-handler.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  build_postgres_image:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            <<: *any_change
          steps:
            - run: circleci-agent step halt
      - checkout
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - build_and_cache_image:
          image_name: bichard-postgres
          dockerfile: environment/postgres/Dockerfile
          cache_key: buildkit-postgres
          image_tag: latest
          context: environment/postgres
      - run:
          name: Save Docker image
          command: |
            mkdir -p images
            docker image save "bichard-postgres:latest" | pigz > "images/postgres.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  build_leds_image:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            <<: *any_change
          steps:
            - run: circleci-agent step halt
      - checkout
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - build_and_cache_image:
          image_name: bichard-leds
          dockerfile: environment/mock-server/Dockerfile
          cache_key: buildkit-leds
          image_tag: latest
          context: environment/mock-server
      - run:
          name: Save Docker image
          command: |
            mkdir -p images
            docker image save "bichard-leds:latest" | pigz > "images/leds.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  build_message_forwarder_image:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            <<: *any_change
          steps:
            - run: circleci-agent step halt
      - checkout
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - fetch_images:
          images: nodejs-24-2023
      - build_and_cache_image:
          image_name: message-forwarder
          dockerfile: packages/message-forwarder/Dockerfile
          cache_key: buildkit-message-forwarder
          image_tag: latest
      - run:
          name: Save Docker image
          command: |
            mkdir -p images
            docker image save "message-forwarder:latest" | pigz > "images/message-forwarder.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  build_worker_image:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            <<: *any_change
          steps:
            - run: circleci-agent step halt
      - checkout
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - fetch_images:
          images: nodejs-24-2023
      - build_and_cache_image:
          image_name: bichard-worker
          dockerfile: packages/conductor/Dockerfile
          cache_key: buildkit-worker
          image_tag: latest
      - run:
          name: Save Docker image
          command: |
            mkdir -p images
            docker image save "bichard-worker:latest" | pigz > "images/worker.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  build_api_image:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            <<: *any_change
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - fetch_images:
          images: nodejs-24-2023 nginx-nodejs-24-2023-supervisord
      - build_and_cache_image:
          image_name: api
          dockerfile: packages/api/Dockerfile
          cache_key: buildkit-api
      - run:
          name: Save Docker image
          command: |
            mkdir -p images
            docker image save "api:${DOCKER_TAG}" | pigz > "images/api.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  build_ui_image:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            <<: *any_change
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - fetch_images:
          images: nodejs-24-2023 nginx-nodejs-24-2023-supervisord
      - build_and_cache_image:
          image_name: ui
          dockerfile: packages/ui/Dockerfile
          cache_key: buildkit-ui
      - run:
          name: Save Docker image
          command: |
            mkdir -p images
            docker image save "ui:${DOCKER_TAG}" | pigz > "images/ui.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  build_user_service_image:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            <<: *any_change
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - fetch_images:
          images: nodejs-24-2023 nginx-nodejs-24-2023-supervisord
      - build_and_cache_image:
          image_name: user-service
          dockerfile: packages/user-service/Dockerfile
          cache_key: buildkit-user-service
      - run:
          name: Save Docker image
          command: |
            mkdir -p images
            docker image save "user-service:${DOCKER_TAG}" | pigz > "images/user-service.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  test_core:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.core-changes >>
              - << pipeline.parameters.env-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_api_image
      - load_audit_logging_image
      - node/install
      - node_install_packages
      - build_common
      - run:
          name: Run PostgreSQL
          command: npm run postgres
      - run:
          name: Run ActiveMQ
          command: npm run activemq
      - run:
          name: Run Localstack
          command: npm run localstack
      - run:
          name: Run Mailhog
          command: npm run mailserver
      - run:
          name: Run Conductor
          command: npm run conductor-only
      - run:
          name: Run the B7 API
          command: npm run api
      - run:
          name: Run unit tests against core code
          command: nvm use && npm run -w packages/core test:unit
      - run:
          name: Run integration tests against core code
          command: nvm use && npm run -w packages/core test:integration

  comparison_test:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.core-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - attach_workspace:
          at: .
      - load_postgres_image
      - node_install_packages
      - build_common
      - run:
          name: Spin up the PostgreSQL database
          command: npm run postgres
      - run:
          name: Run E2E comparison tests against Core Phase 1
          command: npm run -w packages/core test:compare:phase1
      - run:
          name: Run E2E comparison tests against Core Phase 2
          command: npm run -w packages/core test:compare:phase2
      - run:
          name: Run E2E comparison tests against Core Phase 3
          command: npm run -w packages/core test:compare:phase3

  characterisation_test:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.core-changes >>
              - << pipeline.parameters.characterisation-test-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - node_install_packages
      - build_common
      - run:
          name: Run tests against core code
          command: npm run test:characterisation -w packages/core

  test_conductor:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.core-changes >>
              - << pipeline.parameters.conductor-changes >>
              - << pipeline.parameters.env-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_message_forwarder_image
      - load_worker_image
      - load_ui_image
      - load_user_service_image
      - load_api_image
      - load_audit_logging_image
      - node/install
      - node_install_packages
      - build_core
      - run:
          name: Boot Conductor infrastructure
          environment:
            PHASE_2_QUEUE_NAME: TEST_PHASE2_QUEUE
            PHASE_3_QUEUE_NAME: TEST_PHASE3_QUEUE
          command: .circleci/scripts/run-infrastructure.sh 'api ui user-service' all
      - run:
          name: Test the workflows
          command: nvm use && npm run -w packages/conductor test

  test_message_forwarder:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.message-forwarder-changes >>
              - << pipeline.parameters.env-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_message_forwarder_image
      - load_worker_image
      - load_ui_image
      - load_user_service_image
      - load_api_image
      - node/install
      - node_install_packages
      - build_core
      - run:
          name: Boot Conductor infrastructure
          command: .circleci/scripts/run-infrastructure.sh 'ui user-service api' all
      - run:
          name: Test the workflows
          command: nvm use && npm run -w packages/message-forwarder test

  cucumber_e2e_legacy_tests:
    machine:
      image: ubuntu-2204:current
    resource_class: xlarge
    parallelism: 10
    environment:
      NEXTUI: false
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.conductor-changes >>
              - << pipeline.parameters.core-changes >>
              - << pipeline.parameters.e2e-test-changes >>
              - << pipeline.parameters.env-changes >>
              - << pipeline.parameters.message-forwarder-changes >>
              - << pipeline.parameters.user-service-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - run:
          name: Check for tests
          command: bash .circleci/scripts/check-tests.sh "e2e-test" "features/**/*.feature"
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_message_forwarder_image
      - load_worker_image
      - load_ui_image
      - load_user_service_image
      - load_api_image
      - load_leds_image
      - load_audit_logging_image
      - node_install_packages
      - build_core
      - run:
          name: Run the infrastructure
          command: .circleci/scripts/run-infrastructure.sh "ui user-service api" all
      - run:
          name: Install browsers for puppeteer
          working_directory: packages/e2e-test
          command: "npm run install-browsers"
      - run:
          name: Run e2e tests against core code
          working_directory: packages/e2e-test
          environment:
            AWS_URL: http://localhost:4566
            RECORD: "true"
          command: bash ./scripts/run_test_chunk.sh 'not @Excluded and not @ExcludedOnConductor and not @OnlyRunsOnPNC'
      - save_artifacts

  test_api:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.api-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.ui-changes >>
              - << pipeline.parameters.env-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_worker_image
      - node/install
      - node_install_packages
      - build_common
      - fetch_images:
          images: conductor
      - run:
          name: Boot Dependencies
          command: |
            NOWORKER=true SKIP_CONDUCTOR_SETUP=true ./environment/boot.sh db-seed localstack audit-log-api
            docker compose --project-name bichard -f environment/docker-compose.yml -f environment/docker-compose-worker.yml up -d --no-deps --wait conductor worker
            npm run -w packages/conductor setup
      - run:
          name: Run unit and integration tests against API code
          command: nvm use && npm run -w packages/api test
      - run:
          name: Run e2e tests against API code
          command: nvm use && npm run -w packages/api test:e2e

  test_common:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.env-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - node/install
      - node_install_packages
      - run:
          name: Unit test common
          command: nvm use && npm run test -w packages/common

  test_postgres:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.env-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - attach_workspace:
          at: .
      - load_postgres_image
      - run:
          name: Spin up the PostgreSQL database
          command: npm run postgres
      - run:
          command: DB_HOST=172.17.0.1 bash ./environment/postgres/tests/test-all.sh
          name: run Postgres function tests

  test_ui:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.ui-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.core-changes >>
              - << pipeline.parameters.api-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_audit_logging_image
      - node/install
      - node_install_packages
      - fetch_images:
          images: nodejs-24-2023
      - start_services:
          SERVICES: activemq localstack db-seed audit-log-api
      - build_core
      - run:
          name: Run code-based unit tests
          command: nvm use && npm run -w packages/ui test:unit
      - run:
          name: Run integration tests
          command: nvm use && npm run -w packages/ui test:integration

  test_ui_component:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.ui-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.core-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - node/install
      - run:
          name: Install Cypress
          command: ./.circleci/scripts/install-cypress.sh 2>&1
          background: true
      - node_install_packages
      - run:
          name: Install GOV.UK Assets
          command: npm run -w packages/ui install:assets
      - build_core
      - run:
          name: Wait for cypress install to finish
          command: until [ -f cypressInstalled ]; do sleep 1; done
          no_output_timeout: 10m
      - run:
          name: Retrying installing Cypress
          command: ./.circleci/scripts/install-cypress.sh
      - run:
          name: Run UI component tests
          command: bash ./.circleci/scripts/ui-scripts/run-component-tests.sh
          environment:
            UI_IS_HTTPS: true
            TZ: "Europe/London"
      - store_test_results:
          path: ~/project/packages/ui/cypress/results
      - store_artifacts:
          path: ~/project/packages/ui/cypress/videos
      - store_artifacts:
          path: ~/project/packages/ui/cypress/screenshots

  test_user_service:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.user-service-changes >>
              - << pipeline.parameters.env-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_audit_logging_image
      - node/install
      - node_install_packages
      - start_services:
          SERVICES: db-seed audit-log-api
      - run:
          name: Run unit tests against user service code
          command: nvm use && npm run -w packages/user-service test:unit
      - run:
          name: Run integration tests against user service code
          command: nvm use && npm run -w packages/user-service test:integration

  test_user_service_e2e:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    parallelism: 4
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.user-service-changes >>
              - << pipeline.parameters.env-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - run:
          name: Check for tests
          command: bash .circleci/scripts/check-tests.sh "user-service" "cypress/e2e/**/*.cy.js"
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_audit_logging_image
      - node/install
      - node_install_packages
      - run:
          name: Install Cypress
          command: |
            cd packages/user-service
            npx cypress install
      - run:
          name: Install GOV.UK Assets
          command: npm run -w packages/user-service install:assets
      - run:
          name: Build the user service
          command: npm run -w packages/user-service build
      - start_services:
          SERVICES: db-seed
      - run:
          name: Run e2e tests against user service code
          command: bash .circleci/scripts/user-service/run-cypress-e2e-tests.sh
          environment:
            INCORRECT_DELAY: 0
      - store_test_results:
          path: ~/project/packages/user-service/cypress/results
      - store_artifacts:
          path: ~/project/packages/user-service/cypress/videos
      - store_artifacts:
          path: ~/project/packages/user-service/cypress/screenshots

  cypress_e2e_tests:
    machine:
      image: ubuntu-2204:current
    resource_class: xlarge
    parallelism: 10
    parameters:
      <<: *ui_params
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.ui-changes >>
              - << pipeline.parameters.user-service-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.core-changes >>
              - << pipeline.parameters.env-changes >>
              - and:
                  - equal: [true, << pipeline.parameters.api-changes >>]
                  - equal: [true, << parameters.api >>]
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - run:
          name: Check for tests
          command: bash .circleci/scripts/check-tests.sh "ui" "cypress/e2e/**/*.cy.ts"
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_ui_image
      - load_user_service_image
      - load_api_image
      - load_audit_logging_image
      - node/install
      - run:
          name: Install Cypress
          command: ./.circleci/scripts/install-cypress.sh 2>&1
          background: true
      - node_install_packages
      - build_common
      - run:
          name: Wait for cypress install to finish
          command: until [ -f cypressInstalled ]; do sleep 1; done
          no_output_timeout: 10m
      - run:
          name: Retrying Installing Cypress
          command: ./.circleci/scripts/install-cypress.sh
      - run:
          name: Building infrastructure
          environment:
            <<: *ui_envs
          command: bash .circleci/scripts/run-infrastructure.sh "ui user-service api" ui
      - when:
          condition:
            equal: [true, << parameters.api >>]
          steps:
            run:
              name: Boot Conductor
              environment:
                <<: *ui_envs
              command: bash .circleci/scripts/run-infrastructure.sh "ui user-service api" conductor
      - run:
          name: Run UI tests
          command: bash .circleci/scripts/ui-scripts/run-cypress-e2e-tests.sh
          environment:
            API: "<< parameters.api >>"
            UI_IS_HTTPS: true
            TZ: "Europe/London"
      - store_test_results:
          path: ~/project/packages/ui/cypress/results
      - store_artifacts:
          path: ~/project/packages/ui/cypress/videos
      - store_artifacts:
          path: ~/project/packages/ui/cypress/screenshots

  cucumber_e2e_tests:
    machine:
      image: ubuntu-2204:current
    resource_class: xlarge
    parallelism: 10
    parameters:
      <<: *ui_params
      use-leds:
        type: boolean
        default: false
    environment:
      RECORD: "true"
      STACK_TYPE: next
      WORKSPACE: local-next
      AUTH_TYPE: user-service
      TZ: "Europe/London"
      USE_LEDS: << parameters.use-leds >>
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.ui-changes >>
              - << pipeline.parameters.user-service-changes >>
              - << pipeline.parameters.e2e-test-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.core-changes >>
              - << pipeline.parameters.env-changes >>
              - and:
                  - equal: [true, << pipeline.parameters.api-changes >>]
                  - equal: [true, << parameters.api >>]
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - run:
          name: Check for tests
          command: bash .circleci/scripts/check-tests.sh "e2e-test" "features/**/*.feature"
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_message_forwarder_image
      - load_worker_image
      - load_ui_image
      - load_user_service_image
      - load_api_image
      - load_leds_image
      - load_audit_logging_image
      - when:
          condition: << parameters.use-leds >>
          steps:
            - load_leds_image
      - node/install
      - node_install_packages
      - build_core
      - run:
          name: Install browsers for puppeteer
          working_directory: packages/e2e-test
          command: "npm run install-browsers"
      - run:
          name: Building infrastructure
          environment:
            <<: *ui_envs
          command: bash .circleci/scripts/run-infrastructure.sh "ui user-service api" all
      - run:
          name: Run e2e tests against UI code
          working_directory: packages/e2e-test
          environment:
            RECORD: "true"
            NEXTUI: "true"
            MESSAGE_ENTRY_POINT: "s3"
          command: bash ./scripts/run_test_chunk.sh "not @Excluded and not @ExcludedOnMaster and not @OnlyRunsOnPNC"
      - save_artifacts

  zap_scanner:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - unless:
          condition:
            or:
              - << pipeline.parameters.circleci-changes >>
              - << pipeline.parameters.ui-changes >>
              - << pipeline.parameters.user-service-changes >>
              - << pipeline.parameters.common-changes >>
              - << pipeline.parameters.core-changes >>
          steps:
            - run: circleci-agent step halt
      - checkout
      - set_docker_tag
      - attach_workspace:
          at: .
      - load_postgres_image
      - load_ui_image
      - load_user_service_image
      - load_api_image
      - load_audit_logging_image
      - node/install
      - node_install_packages
      - build_core
      - run:
          name: Boot up infra
          command: bash .circleci/scripts/run-infrastructure.sh "ui user-service" ui
      - run:
          name: Seed database
          command: DEPLOY_NAME=e2e-test npm run -w packages/ui seed-data
      - run:
          name: Run ZAP scanner
          command: IS_CI=true npm run -w packages/ui zap

workflows:
  test-all:
    jobs:
      - lint_and_build
      - characterisation_test
      - test_common
      - test_ui_component

      - build_postgres_image
      - build_leds_image
      - build_message_forwarder_image
      - build_worker_image
      - build_ui_image
      - build_user_service_image
      - build_api_image
      - build_audit_logging_images

      - comparison_test:
          requires:
            - build_postgres_image
      - test_postgres:
          requires:
            - build_postgres_image
      - test_ui:
          requires:
            - build_postgres_image
            - build_audit_logging_images
      - test_user_service:
          requires:
            - build_postgres_image
            - build_audit_logging_images
      - test_user_service_e2e:
          requires:
            - build_postgres_image
            - build_audit_logging_images

      - test_core:
          requires:
            - build_postgres_image
            - build_api_image
            - build_audit_logging_images

      - test_message_forwarder:
          requires:
            - build_postgres_image
            - build_message_forwarder_image
            - build_worker_image
            - build_ui_image
            - build_user_service_image
            - build_api_image
            - build_audit_logging_images

      - test_api:
          requires:
            - build_postgres_image
            - build_worker_image
            - build_api_image

      - test_conductor:
          requires:
            - build_postgres_image
            - build_message_forwarder_image
            - build_worker_image
            - build_ui_image
            - build_user_service_image
            - build_api_image
            - build_audit_logging_images

      - cypress_e2e_tests:
          name: cypress_e2e_tests
          requires:
            - build_postgres_image
            - build_ui_image
            - build_user_service_image
            - build_api_image
            - build_leds_image
            - build_audit_logging_images
      - cypress_e2e_tests:
          name: cypress_e2e_tests_api
          api: true
          forces-with-api-enabled: "01"
          api-case-details: true
          api-case-list: true
          api-case-resubmit: true
          requires:
            - build_postgres_image
            - build_ui_image
            - build_user_service_image
            - build_api_image
            - build_leds_image
            - build_audit_logging_images

      - cucumber_e2e_tests:
          name: cucumber_e2e_tests
          requires:
            - build_postgres_image
            - build_message_forwarder_image
            - build_worker_image
            - build_ui_image
            - build_user_service_image
            - build_api_image
            - build_leds_image
            - build_audit_logging_images
      - cucumber_e2e_tests:
          name: cucumber_e2e_tests_leds
          use-leds: true
          requires:
            - build_postgres_image
            - build_leds_image
            - build_message_forwarder_image
            - build_worker_image
            - build_ui_image
            - build_user_service_image
            - build_api_image
            - build_audit_logging_images
      - cucumber_e2e_tests:
          name: cucumber_e2e_tests_api
          api: true
          forces-with-api-enabled: "01"
          api-case-details: true
          api-case-list: true
          api-case-resubmit: true
          requires:
            - build_postgres_image
            - build_message_forwarder_image
            - build_worker_image
            - build_ui_image
            - build_user_service_image
            - build_api_image
            - build_leds_image
            - build_audit_logging_images

      - cucumber_e2e_legacy_tests:
          requires:
            - build_postgres_image
            - build_message_forwarder_image
            - build_worker_image
            - build_user_service_image
            - build_api_image
            - build_ui_image
            - build_audit_logging_images
            - build_leds_image

      - zap_scanner:
          requires:
            - build_postgres_image
            - build_ui_image
            - build_user_service_image
            - build_api_image
            - build_audit_logging_images